name: Build & Push OpenChamber Multi-Arch Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup QEMU (needed for multi-arch build)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ Log in to Docker Hub
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5️⃣ Build and push multi-arch image
      - name: Build and Push OpenChamber
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            yourdockerhubuser/openchamber:latest
            yourdockerhubuser/openchamber:${{ github.sha }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            # optional if your Dockerfile uses ARGs
            GENERIC_TIMEZONE=${{ secrets.GENERIC_TIMEZONE }}